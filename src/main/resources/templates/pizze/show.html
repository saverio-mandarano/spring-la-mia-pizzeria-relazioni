<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="fragments/fragments :: head">
    <title>Dettaglio Pizza</title>
  </head>

  <body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="container mt-4">
      <h2 class="mb-4">Dettaglio Pizza</h2>

      <div th:if="${pizza != null}" class="card mb-4">
        <div class="row g-0">
          <div class="col-md-4">
            <img
              th:src="${pizza.url}"
              class="img-fluid rounded-start"
              alt="pizza"
              style="height: 100%; object-fit: cover"
            />
          </div>

          <div class="col-md-8">
            <div class="card-body">
              <h3 class="card-title" th:text="${pizza.name}"></h3>

              <p class="card-text">
                <strong>Ingredienti:</strong>
                <span th:text="${pizza.description}"></span>
              </p>

              <p class="card-text">
                <strong>Prezzo:</strong>
                <span th:text="${pizza.price} + ' €'"></span>
              </p>

              <p class="card-text">
                <strong>ID:</strong>
                <span th:text="${pizza.id}"></span>
              </p>

              <a th:href="@{/pizze}" class="btn btn-primary mt-3">
                Torna all’elenco
              </a>
            </div>
          </div>
        </div>
      </div>

      <p th:unless="${pizza != null}">Pizza non trovata.</p>
      <!-- crea nuova promozione btn -->
      <a
        th:href="@{/pizze/{id}/promotion (id = ${pizza.id})}"
        class="btn btn-outline-primary mt-4"
        >Create New Promotion</a
      >
    </div>

    <div th:replace="fragments/fragments :: scripts"></div>
  </body>
</html>
